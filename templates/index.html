<!DOCTYPE html>
<html>
<head>

<title>SQL Query Generator</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin-top:80px;
}

.container{
background:white;
padding:30px;
width:500px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
padding:10px 20px;
font-size:16px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
background:#eef;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Natural Language → SQL Generator</h2>

<form method="POST">

<input type="text" name="query" placeholder="Ask database question..." required>

<br><br>

<button type="submit">Generate SQL</button>

</form>

{% if sql %}

<div class="result">

<h3>Generated SQL</h3>

<p>{{sql}}</p>

</div>

{% endif %}

{% if results %}

<div class="result">

<h3>Results</h3>

{% for row in results %}
<p>{{row}}</p>
{% endfor %}

</div>

{% endif %}

</div>

</body>
</html>
